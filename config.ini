[grid]
; Number of columns and rows to divide the screen into.
; A 3x3 grid gives 9 segments, 4x3 gives 12, etc.
columns = 5
rows    = 4

[dwell]
; How long (ms) the gaze must stay inside a segment before its command fires.
dwell_ms    = 400

; How long (ms) before the same segment can fire its command again.
cooldown_ms = 1500

[ai]
; How often (seconds) the currently active segment is captured and queued
; for AI analysis.  Set to 0 to disable periodic capture.
capture_interval_s = 1

[nsfw]
; Local HuggingFace model used for NSFW classification.
; Downloaded and cached on first run (~350 MB), fully offline afterwards.
model = AdamCodd/vit-base-nsfw-detector

; Labels that count as NSFW (comma-separated).
; AdamCodd/vit-base-nsfw-detector available labels: nsfw, sfw
nsfw_labels = nsfw

; Confidence threshold (0.0 – 1.0).  A segment must score at or above this
; value for at least one nsfw_label to be considered NSFW.
threshold = 0.65

; Seconds to wait before the same segment can trigger the command again.
cooldown_s = 30

; Mono-colour fast-path threshold (0.0 – 1.0).
; If this fraction (or more) of a segment's pixels share the same colour the
; segment is auto-classified as SFW without running the AI model.
; Typical blank desktop / taskbar areas easily exceed 0.70.
mono_colour_threshold = 0.70

; Pixel-difference threshold for cache invalidation (0.0 – 1.0).
; After a segment has been classified, each subsequent capture is compared
; against the cached image.  If the fraction of pixels that changed
; significantly is AT OR BELOW this value the cache is still considered fresh
; and the segment is NOT re-queued for scanning.
; A value of 0.60 means the content must change by more than 60 % before a
; re-scan is triggered.
pixel_diff_threshold = 0.60

; Shell command to run when NSFW content is detected.
; Leave blank to log only (no action).
; Examples:
;   Lock screen:         rundll32.exe user32.dll,LockWorkStation
;   Close active window: powershell -Command "$wshell = New-Object -ComObject wscript.shell; $wshell.SendKeys('%%{F4}')"
command =

