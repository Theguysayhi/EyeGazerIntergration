[grid]
; Number of columns and rows to divide the screen into.
; A 3x3 grid gives 9 segments, 4x3 gives 12, etc.
columns = 4
rows    = 4

[dwell]
; How long (ms) the gaze must stay inside a segment before its command fires.
dwell_ms    = 400

; How long (ms) before the same segment can fire its command again.
cooldown_ms = 1500

[ai]
; How often (seconds) the currently active segment is captured and queued
; for AI analysis.  Set to 0 to disable periodic capture.
capture_interval_s = 1

[commands]
; Map each segment to a shell command using the key  segment_{row}_{col}
; Rows and columns are zero-indexed from the top-left.
; Leave the value blank to have no command for that segment.
;
; Example layout for a 3x3 grid:
;
;   (0,0) | (0,1) | (0,2)
;   ------+-------+------
;   (1,0) | (1,1) | (1,2)
;   ------+-------+------
;   (2,0) | (2,1) | (2,2)
;
segment_0_0 =
segment_0_1 =
segment_0_2 =
segment_1_0 =
segment_1_1 =
segment_1_2 =
segment_2_0 =
segment_2_1 =
segment_2_2 =
